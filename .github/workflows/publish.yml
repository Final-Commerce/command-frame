name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    uses: Final-Commerce/central-ops/.github/workflows/publish-package.yml@v1.0.3
    with:
      publish_npm: true
      commit_version: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
