name: Deploy Example App

on:
  push:
    branches:
      - main
      - release-staging

    paths:
      - "example/**"
      - "src/**"
      - "package.json"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      WEB_HOSTING_API_KEY: ${{ github.ref_name == 'release-staging' && secrets.WEB_HOSTING_API_KEY_STAGING || secrets.WEB_HOSTING_API_KEY_PROD }}
      WEB_HOSTING_API_SECRET: ${{ github.ref_name == 'release-staging' && secrets.WEB_HOSTING_API_SECRET_STAGING || secrets.WEB_HOSTING_API_SECRET_PROD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "release-staging" ]; then
            echo "api_url=https://staging.services.finalpos.com/v1/api" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "api_url=https://services.finalpos.com/v1/api" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          fi

      - name: Get versions
        id: versions
        run: |
          LIB_VERSION=$(node -p "require('./package.json').version")
          APP_VERSION=$(node -p "require('./example/package.json').version")
          echo "lib_version=$LIB_VERSION" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Prepare example app
        working-directory: example
        run: |
          APP_VERSION="${{ steps.versions.outputs.app_version }}"
          LIB_VERSION="${{ steps.versions.outputs.lib_version }}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'command-frame-example-web-app';
            pkg.version = '${APP_VERSION}';
            pkg.dependencies['@final-commerce/command-frame'] = '^${LIB_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        working-directory: example
        run: npm install

      - name: Build example app
        working-directory: example
        run: npm run build

      - name: Create tarball
        working-directory: example
        run: tar -czvf dist.tar.gz ./dist

      - name: Get existing apps from API
        id: get_apps
        run: |
          curl -s -X GET '${{ steps.env.outputs.api_url }}/web-hosting/apps' \
            -H "x-api-key: $WEB_HOSTING_API_KEY" \
            -H "x-api-secret: $WEB_HOSTING_API_SECRET" > /tmp/existing_apps.json

      - name: Deploy to web hosting
        id: deploy
        env:
          CHAT_WEBHOOK_NEW_APP: ${{ secrets.GOOGLE_CHAT_WEBHOOK_NEW_APP }}
          CHAT_WEBHOOK_NEW_VERSION: ${{ secrets.GOOGLE_CHAT_WEBHOOK_NEW_VERSION }}
        working-directory: example
        run: |
          APP="command-frame-example-web-app"
          VERSION="${{ steps.versions.outputs.app_version }}"
          ENV="${{ steps.env.outputs.environment }}"
          API_URL="${{ steps.env.outputs.api_url }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DEVELOPER_EMAIL="${{ github.event.head_commit.author.email }}"
          if [ -z "$DEVELOPER_EMAIL" ]; then
            DEVELOPER_EMAIL="${{ github.event.pusher.email }}"
          fi
          if [ -z "$DEVELOPER_EMAIL" ]; then
            DEVELOPER_EMAIL="${{ github.actor }}@users.noreply.github.com"
          fi

          send_chat() {
            local webhook="$1"
            local message="$2"
            jq -n --arg text "$message" '{"text": $text}' | \
              curl -s -X POST "$webhook" \
                -H "Content-Type: application/json; charset=UTF-8" \
                -d @-
          }

          bump_patch() {
            local ver="$1"
            local major minor patch
            major=$(echo "$ver" | cut -d. -f1)
            minor=$(echo "$ver" | cut -d. -f2)
            patch=$(echo "$ver" | cut -d. -f3)
            echo "${major}.${minor}.$((patch + 1))"
          }

          upload_version() {
            local url="$1"
            local ver="$2"
            local tarball="$3"
            local http_code
            http_code=$(curl -s -o /tmp/upload_response.json -w "%{http_code}" -X POST "$url" \
              -H "x-api-key: $WEB_HOSTING_API_KEY" \
              -H "x-api-secret: $WEB_HOSTING_API_SECRET" \
              -F "version=${ver}" \
              -F "file=@${tarball};type=application/x-gzip")
            echo "$http_code"
          }

          echo "# Deployment Summary ($ENV)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Version | Environment | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|-------------|--------|-----|" >> $GITHUB_STEP_SUMMARY

          APP_ID=$(node -e "
            const fs = require('fs');
            try {
              const apps = JSON.parse(fs.readFileSync('/tmp/existing_apps.json', 'utf8'));
              const app = Array.isArray(apps) ? apps.find(a => a.name === '$APP') : null;
              console.log(app ? app._id : '');
            } catch (e) { console.log(''); }
          ")

          if [ -z "$APP_ID" ]; then
            HTTP_CODE=$(curl -s -o /tmp/create_response.json -w "%{http_code}" -X POST "${API_URL}/web-hosting/apps" \
              -H "x-api-key: $WEB_HOSTING_API_KEY" \
              -H "x-api-secret: $WEB_HOSTING_API_SECRET" \
              -F "name=${APP}" \
              -F "version=${VERSION}" \
              -F "file=@dist.tar.gz;type=application/x-gzip")

            if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
              ERROR_RESPONSE=$(cat /tmp/create_response.json 2>/dev/null || echo "Unknown error")
              MSG=$(cat <<EOF
          Extension Build Failed ($ENV)

          App: $APP
          Version: $VERSION
          Environment: $ENV
          Developer: $DEVELOPER_EMAIL
          Error: Failed to create app (HTTP $HTTP_CODE)
          Response: $ERROR_RESPONSE

          See workflow run for details:
          $WORKFLOW_URL
          EOF
              )
              send_chat "$CHAT_WEBHOOK_NEW_APP" "$MSG"
              echo "| $APP | $VERSION | $ENV | Failed | API error (HTTP $HTTP_CODE) |" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            RESPONSE=$(cat /tmp/create_response.json)
            SUBDOMAIN=$(echo "$RESPONSE" | node -p "try { const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')); data.subdomain || ''; } catch (e) { ''; }")

            if [ -n "$SUBDOMAIN" ]; then
              echo "| $APP | $VERSION | $ENV | Created | [https://$SUBDOMAIN](https://$SUBDOMAIN) |" >> $GITHUB_STEP_SUMMARY
              MSG=$(cat <<EOF
          New Extension Deployed ($ENV)

          App: $APP
          Version: $VERSION
          Environment: $ENV
          Developer: $DEVELOPER_EMAIL
          URL: https://$SUBDOMAIN

          Pls, wait 3-5 minutes for DNS propagation and CDN cache invalidation
          EOF
              )
              send_chat "$CHAT_WEBHOOK_NEW_APP" "$MSG"
            else
              echo "| $APP | $VERSION | $ENV | Created | Subdomain not returned |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            SUBDOMAIN=$(node -e "
              const fs = require('fs');
              try {
                const apps = JSON.parse(fs.readFileSync('/tmp/existing_apps.json', 'utf8'));
                const app = Array.isArray(apps) ? apps.find(a => a.name === '$APP') : null;
                console.log(app ? app.subdomain : '');
              } catch (e) { console.log(''); }
            ")

            UPLOAD_URL="${API_URL}/web-hosting/apps/${APP_ID}/versions"
            MAX_RETRIES=10
            ATTEMPT=0
            UPLOAD_SUCCESS=false

            while [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; do
              HTTP_CODE=$(upload_version "$UPLOAD_URL" "$VERSION" "dist.tar.gz")

              if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "201" ]; then
                UPLOAD_SUCCESS=true
                break
              fi

              RESPONSE_BODY=$(cat /tmp/upload_response.json 2>/dev/null || echo "")
              if echo "$RESPONSE_BODY" | grep -qi "already exists"; then
                echo "Version $VERSION already exists, bumping to next patch..."
                VERSION=$(bump_patch "$VERSION")
                ATTEMPT=$((ATTEMPT + 1))
              else
                MSG=$(cat <<EOF
          Extension Deployment Failed ($ENV)

          App: $APP
          Version: $VERSION
          Environment: $ENV
          Developer: $DEVELOPER_EMAIL
          Error: Failed to upload version (HTTP $HTTP_CODE)
          Response: $RESPONSE_BODY

          See workflow run for details:
          $WORKFLOW_URL
          EOF
                )
                send_chat "$CHAT_WEBHOOK_NEW_VERSION" "$MSG"
                echo "| $APP | $VERSION | $ENV | Failed | Upload error (HTTP $HTTP_CODE) |" >> $GITHUB_STEP_SUMMARY
                exit 1
              fi
            done

            if [ "$UPLOAD_SUCCESS" != "true" ]; then
              MSG=$(cat <<EOF
          Extension Deployment Failed ($ENV)

          App: $APP
          Version: $VERSION
          Environment: $ENV
          Developer: $DEVELOPER_EMAIL
          Error: Exhausted $MAX_RETRIES version bump attempts

          See workflow run for details:
          $WORKFLOW_URL
          EOF
              )
              send_chat "$CHAT_WEBHOOK_NEW_VERSION" "$MSG"
              echo "| $APP | $VERSION | $ENV | Failed | Exhausted version retries |" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            echo "deployed_version=$VERSION" >> $GITHUB_OUTPUT

            HTTP_CODE=$(curl -s -o /tmp/switch_response.json -w "%{http_code}" -X PATCH "${API_URL}/web-hosting/apps/${APP_ID}/switch/${VERSION}" \
              -H "x-api-key: $WEB_HOSTING_API_KEY" \
              -H "x-api-secret: $WEB_HOSTING_API_SECRET")

            if [ "$HTTP_CODE" != "200" ]; then
              ERROR_RESPONSE=$(cat /tmp/switch_response.json 2>/dev/null || echo "Unknown error")
              MSG=$(cat <<EOF
          Extension Deployment Failed ($ENV)

          App: $APP
          Version: $VERSION
          Environment: $ENV
          Developer: $DEVELOPER_EMAIL
          Error: Failed to switch version (HTTP $HTTP_CODE)
          Response: $ERROR_RESPONSE

          See workflow run for details:
          $WORKFLOW_URL
          EOF
              )
              send_chat "$CHAT_WEBHOOK_NEW_VERSION" "$MSG"
              echo "| $APP | $VERSION | $ENV | Failed | Switch error (HTTP $HTTP_CODE) |" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            if [ -n "$SUBDOMAIN" ]; then
              echo "| $APP | $VERSION | $ENV | Updated | [https://$SUBDOMAIN](https://$SUBDOMAIN) |" >> $GITHUB_STEP_SUMMARY
              MSG=$(cat <<EOF
          Extension Updated ($ENV)

          App: $APP
          Version: $VERSION
          Environment: $ENV
          Developer: $DEVELOPER_EMAIL
          URL: https://$SUBDOMAIN

          Pls, wait 3-5 minutes for CDN cache invalidation
          EOF
              )
              send_chat "$CHAT_WEBHOOK_NEW_VERSION" "$MSG"
            else
              echo "| $APP | $VERSION | $ENV | Updated | N/A |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Commit updated example version
        if: steps.deploy.outputs.deployed_version != ''
        run: |
          DEPLOYED_VERSION="${{ steps.deploy.outputs.deployed_version }}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('example/package.json', 'utf8'));
            pkg.version = '${DEPLOYED_VERSION}';
            fs.writeFileSync('example/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet example/package.json; then
            echo "No version change to commit"
            exit 0
          fi

          git add example/package.json
          git commit -m "chore(example): bump version to ${DEPLOYED_VERSION}"
          git push origin ${{ github.ref_name }}
